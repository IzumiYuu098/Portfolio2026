<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Portfolio</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #211264, #351258);
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 80px auto;
            background: #fff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 36px;
            color: #222;
        }

        p {
            font-size: 18px;
            margin: 10px 0;
        }

        .info {
            margin: 30px 0;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 10px;
        }

        .label {
            font-weight: bold;
            color: #555;
        }

        .value {
            font-size: 20px;
            color: #333;
        }

        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            color: #fff;
            background: rgb(255, 0, 0);
            border: none;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn:hover {
            background: #357abd;
            transform: scale(1.05);
        }

        footer {
            margin-top: 30px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>My Portfolio</h1>
        <p>Welcome! Click the button below to download my portfolio.</p>

        <div class="info">
            <p><span class="label">Name:</span></p>
            <p class="value">JEFERSON T. DEL ROSARIO</p>

            <p><span class="label">Section:</span></p>
            <p class="value">BSIT1 SOUTH 8</p>
        </div>

        <a href="DelRosario_Jeferson_Portfolio.pdf" target="_blank" rel="noopener noreferrer" class="btn"> View My Portfolio </a>

        <footer>
            4/22/26 PORTFOLIO 
        </footer>
    </div>

</body>
</html>
